name: Refresh ETF Dashboard

on:
  schedule:
    # A-share market: 09:30-15:00 CST = 01:30-07:00 UTC
    # Every 30 min during trading hours (Mon-Fri)
    - cron: '0,30 1,2,3,4,5,6 * * 1-5'
    # Post-close runs at 15:30 CST (07:30 UTC) and 17:30 CST (09:30 UTC)
    # for final price + share settlement data
    - cron: '30 7,9 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        env:
          # Set workspace to repo root so gen_dashboard.py writes index.html here
          ETF_WORKSPACE: ${{ github.workspace }}
        run: |
          cd $GITHUB_WORKSPACE/scripts
          python3 gen_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html — skipping commit"
          else
            TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
            git commit -m "chore: auto-refresh dashboard ${TIMESTAMP}"
            git push
            echo "✅ Dashboard refreshed at ${TIMESTAMP}"
          fi
