name: Refresh ETF Dashboard

on:
  schedule:
    # A-share market: 09:30-15:00 CST = 01:30-07:00 UTC
    # Every 30 min during trading hours (Mon-Fri)
    - cron: '0,30 1,2,3,4,5,6 * * 1-5'
    # Post-close runs at 15:30 CST (07:30 UTC) and 17:30 CST (09:30 UTC)
    # for final price + share settlement data
    - cron: '30 7,9 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        env:
          # Set workspace to repo root so gen_dashboard.py writes index.html here
          ETF_WORKSPACE: ${{ github.workspace }}
        run: |
          cd $GITHUB_WORKSPACE/scripts
          python3 gen_dashboard.py

      - name: Update shares_history.json from new index.html
        run: |
          python3 - <<'EOF'
          import re, json, os

          def merge_shares(repo_root):
              sh_path = os.path.join(repo_root, "shares_history.json")
              idx_path = os.path.join(repo_root, "index.html")
              
              # Load existing
              try:
                  with open(sh_path) as f:
                      history = json.load(f)
              except Exception:
                  history = {}
              
              # Extract s fields from newly generated index.html
              with open(idx_path) as f:
                  html = f.read()
              m = re.search(r'let BACKEND = (\{.*?\});', html, re.DOTALL)
              if not m:
                  print("No BACKEND found in index.html")
                  return
              backend = json.loads(m.group(1))
              
              new_entries = 0
              for code, etf_data in backend.get("etfs", {}).items():
                  for kl in etf_data.get("klines", []):
                      if "s" in kl and kl["s"]:
                          d = kl["date"]
                          if d not in history:
                              history[d] = {}
                          if code not in history[d]:
                              history[d][code] = {"shares_yi": kl["s"]}
                              new_entries += 1
              
              with open(sh_path, "w") as f:
                  json.dump(history, f, ensure_ascii=False, indent=2)
              print(f"shares_history.json updated: +{new_entries} new entries, {len(history)} dates total")

          merge_shares(os.environ.get("GITHUB_WORKSPACE", "."))
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html shares_history.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
            git commit -m "chore: auto-refresh dashboard ${TIMESTAMP}"
            git push
            echo "✅ Dashboard refreshed at ${TIMESTAMP}"
          fi
